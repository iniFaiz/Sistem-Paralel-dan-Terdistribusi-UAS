version: "3.8"

# ============================================================================
#  Pub-Sub Log Aggregator – Docker Compose
# ============================================================================
#  Services:
#    aggregator  – FastAPI REST API + background consumer workers
#    publisher   – One-shot event generator / simulator
#    broker      – Redis 7 (message broker / streams)
#    storage     – PostgreSQL 16 (persistent event store)
# ============================================================================

services:
  # ── Aggregator (FastAPI) ─────────────────────────────────────────────────
  aggregator:
    build: ./aggregator
    image: uas-aggregator:latest
    depends_on:
      storage:
        condition: service_healthy
      broker:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://user:pass@storage:5432/logdb
      - BROKER_URL=redis://broker:6379
      - WORKER_COUNT=4
      - APP_HOST=0.0.0.0
      - APP_PORT=8080
    ports:
      - "8080:8080"
    volumes:
      - aggregator_data:/var/lib/aggregator
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/stats')\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - internal

  # ── Publisher (one-shot simulator) ──────────────────────────────────────
  publisher:
    build: ./publisher
    image: uas-publisher:latest
    depends_on:
      aggregator:
        condition: service_healthy
      broker:
        condition: service_healthy
    environment:
      - TARGET_URL=http://aggregator:8080/publish
      - BROKER_URL=redis://broker:6379
      - EVENT_COUNT=20000
      - DUPLICATE_RATE=0.3
      - BATCH_SIZE=50
    restart: "no"
    networks:
      - internal

  # ── Broker (Redis 7) ───────────────────────────────────────────────────
  broker:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - broker_data:/data
    networks:
      - internal

  # ── Storage (PostgreSQL 16) ─────────────────────────────────────────────
  storage:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=logdb
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d logdb"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - internal

# ── Named volumes (data persistence across restarts) ─────────────────────
volumes:
  pg_data:
    name: uas_pg_data
  broker_data:
    name: uas_broker_data
  aggregator_data:
    name: uas_aggregator_data

# ── Internal network (no external dependencies) ─────────────────────────
networks:
  internal:
    driver: bridge
    name: uas_internal
